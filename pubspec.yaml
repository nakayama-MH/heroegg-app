name: heroegg
description: "HeroEggオフィシャルアプリ - コワーキング/コミュニティスペース発見アプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.0

  # State管理
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # ルーティング
  go_router: ^14.8.0

  # 位置情報
  geolocator: ^13.0.0

  # 地図
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # URL
  url_launcher: ^6.3.0

  # QRコード
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  # 画像選択
  image_picker: ^1.1.0

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.0

  # データモデル
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # ローカル保存
  shared_preferences: ^2.3.0

  # 日付
  intl: ^0.20.2

  # 環境変数
  flutter_dotenv: ^5.2.1
  flutter_quill: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
